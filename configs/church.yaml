dataset: church
model_id: google/ddpm-ema-church-256
image_size: 256
channels: 3
num_train_timesteps: 1000
beta_schedule: linear
beta_start: 0.0001
beta_end: 0.02
sampling:
  num_samples_fid: 3072
  batch_size: 512
  dtype: float16
  eta_grid: [0.0, 0.2, 0.5, 1.0]
  nfe_grid: [10, 20, 50, 100]
  tau_kind: quadratic
fid:
  mode: legacy_pytorch
  reference: lsun_church
  split: train
seed: 42
